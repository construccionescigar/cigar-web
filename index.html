<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CIGAR | Inicio</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

/* BODY */
body{
  background:#f4f6f8;
}

/* 🔥 HEADER UNIFICADO (IGUAL EN TODAS LAS PÁGINAS) */
header{
  background:#000;
  height:70px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  z-index:3;
}

nav{
  display:flex;
  align-items:center;
}

nav a{
  color:white;
  text-decoration:none;
  margin:0 20px;
  font-size:16px;
  font-weight:bold;
  line-height:70px;
  display:inline-block;
  transition:0.3s;
}

nav a:hover{
  color:#ffb400;
}

/* HERO */
.hero{
  height:85vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
  background:url('https://images.unsplash.com/photo-1504307651254-35680f356dfd') center/cover;
  color:white;
}

/* OVERLAY */
.hero::after{
  content:'';
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.65);
}

/* CONTENIDO */
.hero-content{
  position:relative;
  z-index:2;
}

.hero-logo img{
  height:220px;
  margin-bottom:20px;
}

h1{
  font-size:44px;
}

p{
  font-size:18px;
  margin-top:10px;
  opacity:0.9;
}

/* BOTÓN */
.btn{
  margin-top:25px;
  display:inline-block;
  padding:14px 22px;
  background:#ffb400;
  color:black;
  font-weight:bold;
  text-decoration:none;
  border-radius:6px;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
}

/* RESPONSIVE */
@media(max-width:600px){
  .hero-logo img{height:140px;}
  h1{font-size:30px;}
}

</style>
</head>

<body>

<!-- 🔥 HEADER UNIFICADO -->
<header>
  <nav>
    <a href="./index.html">Inicio</a>
    <a href="./servicios.html">Servicios</a>
    <a href="./contacto.html">Contacto</a>
  </nav>
</header>

<section class="hero">

  <div class="hero-content">

    <div class="hero-logo">
      <img src="https://res.cloudinary.com/deod0oalc/image/upload/LogoCigar_pybcfp.png" alt="CIGAR">
    </div>

    <h1>Construimos el futuro</h1>
    <p>Calidad, confianza y experiencia en cada proyecto</p>

    <a class="btn" href="contacto.html">Contacto</a>

  </div>

</section>

</body>
</html>

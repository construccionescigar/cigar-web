<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CIGAR | Información</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

/* 🔥 FONDO GLOBAL */
body{
  color:white;
  background:url('https://res.cloudinary.com/deod0oalc/image/upload/dc9ae699-debc-4db3-a02b-761af378e440_ym67mn.jpg');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.65);
  z-index:-1;
}

/* HEADER */
header{
  background:#000;
  height:70px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:sticky;
  top:0;
  z-index:1000;
}

nav a{
  color:white;
  text-decoration:none;
  margin:0 20px;
  font-weight:bold;
}

nav a:hover{
  color:#ffb400;
}

/* 🧱 CUADROS ESQUINA */
.corner-box{
  position:fixed;
  top:90px;
  width:280px;
  padding:14px 16px;
  background:rgba(0,0,0,0.55);
  border:1px solid rgba(255,255,255,0.12);
  backdrop-filter: blur(6px);
  color:rgba(255,255,255,0.9);
  font-size:14px;
  letter-spacing:1px;
  text-transform:uppercase;
  line-height:1.4;
  transition:0.5s ease;
  z-index:999;
}

.corner-left{ left:18px; text-align:left; }
.corner-right{ right:18px; text-align:right; }

/* CONTENEDOR 🔼 AJUSTADO */
.container{
  padding:70px 20px 100px;  /* 🔥 SUBIDO (ANTES 140px) */
  text-align:center;
}

/* 🏷️ LOGO */
.page-logo{
  margin-bottom:18px;
}

.page-logo img{
  height:360px;
  max-width:90%;
}

/* TÍTULO */
h1{
  font-size:38px;
  margin-bottom:40px;
  letter-spacing:1px;
}

/* TABS */
.tabs{
  margin-bottom:40px;
}

.tab{
  background:rgba(255,255,255,0.05);
  border:2px solid #ffb400;
  color:#ffb400;
  padding:14px 28px;
  margin:0 12px;
  cursor:pointer;
  border-radius:8px;
  font-size:16px;
  font-weight:bold;
}

.tab.active{
  background:#ffb400;
  color:black;
}

.tab:hover{
  background:#ffb400;
  color:black;
}

/* CONTENIDO */
.tab-contenido{
  max-width:850px;
  margin:auto;
  display:none;
  color:#ddd;
  line-height:1.8;
  font-size:17px;
  background:rgba(0,0,0,0.55);
  padding:25px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);
}

.tab-contenido.active{
  display:block;
}

/* RESPONSIVE */
@media(max-width:600px){
  .corner-box{ width:180px; font-size:11px; }
  .page-logo img{ height:130px; }
}

</style>
</head>

<body>

<header>
  <nav>
    <a href="./index.html">Inicio</a>
    <a href="./informacion.html">Información</a>
    <a href="./servicios.html">Servicios</a>
    <a href="./contacto.html">Contacto</a>
  </nav>
</header>

<!-- 🧱 ESQUINAS -->
<div class="corner-box corner-left" id="sloganLeft"></div>
<div class="corner-box corner-right" id="sloganRight"></div>

<div class="container">

  <!-- 🏷️ LOGO -->
  <div class="page-logo">
    <img src="https://res.cloudinary.com/deod0oalc/image/upload/Logo-CIGAR_o1k60j.png" alt="CIGAR">
  </div>

  <h1>Información Corporativa</h1>

  <div class="tabs">
    <button class="tab active" onclick="mostrarTab('vision', event)">Visión</button>
    <button class="tab" onclick="mostrarTab('trayectoria', event)">Trayectoria</button>
    <button class="tab" onclick="mostrarTab('cobertura', event)">Cobertura</button>
  </div>

  <div id="vision" class="tab-contenido active">
    <p>Ser una empresa líder en el sector metalmecánico a nivel nacional.</p>
  </div>

  <div id="trayectoria" class="tab-contenido">
    <p>Más de 20 años desarrollando proyectos industriales de alto nivel.</p>
  </div>

  <div id="cobertura" class="tab-contenido">
    <p>Cobertura nacional con capacidad de respuesta en todo México.</p>
  </div>

</div>

<script>

/* ESLOGANES INFORMACIÓN */
const slogansLeft = [
"Trayectoria que respalda cada proyecto",
"Experiencia en ingeniería estructural",
"Confianza construida con resultados",
"Liderazgo en soluciones metálicas",
"Compromiso con la excelencia industrial",
"Historia de crecimiento y calidad"
];

const slogansRight = [
"Más de 20 años en la industria",
"Proyectos que avalan nuestra experiencia",
"Solidez en cada desarrollo estructural",
"Ingeniería con visión empresarial",
"Cumplimiento en cada entrega",
"Confianza en cada estructura"
];

let i = 0;

function updateSlogans(){
  document.getElementById("sloganLeft").style.opacity = 0;
  document.getElementById("sloganRight").style.opacity = 0;

  setTimeout(() => {
    document.getElementById("sloganLeft").innerText = slogansLeft[i];
    document.getElementById("sloganRight").innerText = slogansRight[i];

    document.getElementById("sloganLeft").style.opacity = 1;
    document.getElementById("sloganRight").style.opacity = 1;

    i = (i + 1) % slogansLeft.length;
  }, 400);
}

updateSlogans();
setInterval(updateSlogans, 6000);

function mostrarTab(tab, e){
  document.querySelectorAll('.tab-contenido').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

  document.getElementById(tab).classList.add('active');
  e.target.classList.add('active');
}

</script>

</body>
</html>

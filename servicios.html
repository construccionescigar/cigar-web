<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cigar Servicios</title>

<style>

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0a0f14;
  color:white;
}

/* HEADER */
header{
  background:#000;
  height:70px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  z-index:3;
}

nav{
  display:flex;
  align-items:center;
}

nav a{
  color:white;
  text-decoration:none;
  margin:0 20px;
  font-size:16px;
  font-weight:bold;
  line-height:70px;
  display:inline-block;
  transition:0.3s;
}

nav a:hover{
  color:#ffb400;
}

/* TITULO */
.page-header{
  background:#111a22;
  color:white;
  text-align:center;
  padding:25px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.page-header p{
  color:#cfcfcf;
}

/* SECCIÓN */
.servicios{
  padding:50px 20px;
  text-align:center;
}

.servicios h2{
  color:#ffb400;
  margin-bottom:25px;
}

/* GRID */
.grid-servicios{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
  max-width:1100px;
  margin:auto;
}

/* CARD */
.servicio{
  background:#121a22;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.4);
  border:1px solid rgba(255,255,255,0.08);
  transition:0.3s;
}

.servicio:hover{
  transform:translateY(-5px);
  box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

.servicio img{
  width:100%;
  height:180px;
  object-fit:cover;
  display:block;
}

.servicio h3{
  margin:0;
  padding:12px;
  color:white;
}

/* 🧱 SLOGANS ESQUINAS */
.corner-box{
  position:fixed;
  top:90px;
  width:280px;
  padding:14px 16px;
  background:rgba(0,0,0,0.55);
  border:1px solid rgba(255,255,255,0.12);
  backdrop-filter: blur(6px);
  color:rgba(255,255,255,0.9);
  font-size:14px;
  letter-spacing:1px;
  text-transform:uppercase;
  line-height:1.4;
  transition:0.5s ease;
  z-index:999;
}

.corner-left{ left:18px; text-align:left; }
.corner-right{ right:18px; text-align:right; }

@media(max-width:600px){
  .corner-box{
    width:180px;
    font-size:11px;
  }
}

</style>
</head>

<body>

<header>
<nav>
  <a href="./index.html">Inicio</a>
  <a href="./informacion.html">Información</a>
  <a href="./servicios.html">Servicios</a>
  <a href="./contacto.html">Contacto</a>
</nav>
</header>

<!-- 🧱 SLOGANS -->
<div class="corner-box corner-left" id="sloganLeft"></div>
<div class="corner-box corner-right" id="sloganRight"></div>

<!-- TITULO -->
<div class="page-header">
  <h1>Estructuras y Construcciones Cigar</h1>
  <p>Servicios industriales especializados</p>
</div>

<!-- SERVICIOS -->
<section class="servicios">
<h2>Servicios</h2>

<div class="grid-servicios">

<div class="servicio">
<img src="https://res.cloudinary.com/deod0oalc/image/upload/Fabricaci%C3%B3n_estructura_v7jdk2.png">
<h3>Fabricación de estructuras</h3>
</div>

<div class="servicio">
<img src="https://res.cloudinary.com/deod0oalc/image/upload/Montaje_estructura_qjbbs1.png">
<h3>Montaje de estructuras</h3>
</div>

<div class="servicio">
<img src="https://res.cloudinary.com/deod0oalc/image/upload/Herrer%C3%ADa_general_f2zhjn.png">
<h3>Herrería en general</h3>
</div>

<div class="servicio">
<img src="https://res.cloudinary.com/deod0oalc/image/upload/Suministro_lamina_dhvsvq.png">
<h3>Suministro de lámina</h3>
</div>

<div class="servicio">
<img src="https://res.cloudinary.com/deod0oalc/image/upload/Pintura_industrial_ve15yk.png">
<h3>Pintura industrial</h3>
</div>

<div class="servicio">
<img src="https://res.cloudinary.com/deod0oalc/image/upload/Calculo_industrial_m5ijfw.png">
<h3>Cálculo estructural</h3>
</div>

</div>

</section>

<script>

const slogansLeft = [
"Fabricación de acero estructural de alta precisión",
"Montaje industrial con ingeniería especializada",
"Soluciones metálicas para grandes proyectos",
"Calidad en cada estructura fabricada",
"Procesos industriales de alto rendimiento",
"Construcción metálica de nivel profesional"
];

const slogansRight = [
"Estructuras diseñadas para máxima resistencia",
"Montaje seguro y eficiente en obra",
"Precisión en cada unión estructural",
"Cumplimiento en proyectos industriales",
"Ingeniería aplicada al acero estructural",
"Resultados que sostienen grandes obras"
];

let i = 0;

function updateSlogans(){
  document.getElementById("sloganLeft").style.opacity = 0;
  document.getElementById("sloganRight").style.opacity = 0;

  setTimeout(() => {
    document.getElementById("sloganLeft").innerText = slogansLeft[i];
    document.getElementById("sloganRight").innerText = slogansRight[i];

    document.getElementById("sloganLeft").style.opacity = 1;
    document.getElementById("sloganRight").style.opacity = 1;

    i = (i + 1) % slogansLeft.length;
  }, 400);
}

updateSlogans();
setInterval(updateSlogans, 6000);

</script>

</body>
</html>

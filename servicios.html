<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cigar Servicios</title>

<style>

body{
  margin:0;
  font-family:Arial, sans-serif;

  /* 🔥 FONDO INDUSTRIAL NUEVO */
  background:#0a0f14;
  color:white;
}

/* 🔥 HEADER UNIFICADO */
header{
  background:#000;
  height:70px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  z-index:3;
}

nav{
  display:flex;
  align-items:center;
}

nav a{
  color:white;
  text-decoration:none;
  margin:0 20px;
  font-size:16px;
  font-weight:bold;
  line-height:70px;
  display:inline-block;
  transition:0.3s;
}

nav a:hover{
  color:#ffb400;
}

/* TITULO PRINCIPAL */
.page-header{
  background:#111a22;
  color:white;
  text-align:center;
  padding:25px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.page-header p{
  color:#cfcfcf;
}

/* SECCIÓN */
.servicios{
  padding:50px 20px;
  text-align:center;
}

.servicios h2{
  color:#ffb400;
  margin-bottom:25px;
}

/* GRID */
.grid-servicios{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
  max-width:1100px;
  margin:auto;
}

/* CARD */
.servicio{
  background:#121a22;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.4);
  border:1px solid rgba(255,255,255,0.08);
  transition:0.3s;
}

.servicio:hover{
  transform:translateY(-5px);
  box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

/* IMAGEN */
.servicio img{
  width:100%;
  height:180px;
  object-fit:cover;
  display:block;
}

/* TEXTO */
.servicio h3{
  margin:0;
  padding:12px;
  color:white;
}

</style>
</head>

<body>

<!-- HEADER -->
<header>
<nav>
  <a href="./index.html">Inicio</a>
  <a href="./informacion.html">Información</a>
  <a href="./servicios.html">Servicios</a>
  <a href="./contacto.html">Contacto</a>
</nav>
</header>

<!-- TITULO -->
<div class="page-header">
  <h1>Estructuras y Construcciones Cigar</h1>
  <p>Servicios industriales especializados</p>
</div>

<!-- SERVICIOS -->
<section class="servicios">
<h2>Servicios</h2>

<div class="grid-servicios">

<div class="servicio">
<img src="https://res.cloudinary.com/deod0oalc/image/upload/Fabricaci%C3%B3n_estructura_v7jdk2.png">
<h3>Fabricación de estructuras</h3>
</div>

<div class="servicio">
<img src="https://res.cloudinary.com/deod0oalc/image/upload/Montaje_estructura_qjbbs1.png">
<h3>Montaje de estructuras</h3>
</div>

<div class="servicio">
<img src="https://res.cloudinary.com/deod0oalc/image/upload/Herrer%C3%ADa_general_f2zhjn.png">
<h3>Herrería en general</h3>
</div>

<div class="servicio">
<img src="https://res.cloudinary.com/deod0oalc/image/upload/Suministro_lamina_dhvsvq.png">
<h3>Suministro de lámina</h3>
</div>

<div class="servicio">
<img src="https://res.cloudinary.com/deod0oalc/image/upload/Pintura_industrial_ve15yk.png">
<h3>Pintura industrial</h3>
</div>

<div class="servicio">
<img src="https://res.cloudinary.com/deod0oalc/image/upload/Calculo_industrial_m5ijfw.png">
<h3>Cálculo estructural</h3>
</div>

</div>

</section>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cigar Servicios</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f4f4;
}

nav{
  background:#000;
  padding:15px;
  text-align:center;
}

nav a{
  color:white;
  margin:0 15px;
  text-decoration:none;
  font-weight:bold;
}

header{
  background:#111;
  color:white;
  text-align:center;
  padding:25px;
}

.servicios{
  padding:50px 20px;
  text-align:center;
}

.grid-servicios{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
  max-width:1100px;
  margin:auto;
}

.servicio{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.12);
  transition:0.3s;
}

.servicio:hover{
  transform:scale(1.03);
}

.servicio img{
  width:100%;
  height:180px;
  object-fit:cover;
  display:block;
}

.servicio h3{
  margin:0;
  padding:12px;
}
</style>
</head>

<body>

<!-- 🔥 NAVBAR (ESTO ES LO QUE TE FALTABA) -->
<nav>
  <a href="./index.html">Inicio</a>
  <a href="./servicios.html">Servicios</a>
  <a href="./contacto.html">Contacto</a>
</nav>

<header>
<h1>Cigar Estructuras</h1>
<p>Servicios industriales especializados</p>
</header>

<section class="servicios">
<h2>Servicios</h2>

<div class="grid-servicios">

<div class="servicio">
<img src="https://res.cloudinary.com/deod0oalc/image/upload/Fabricaci%C3%B3n_estructura_v7jdk2.png" alt="Fabricación de estructuras">
<h3>Fabricación de estructuras</h3>
</div>

<div class="servicio">
<img src="https://res.cloudinary.com/deod0oalc/image/upload/Montaje_estructura_qjbbs1.png" alt="Montaje de estructuras">
<h3>Montaje de estructuras</h3>
</div>

<div class="servicio">
<img src="https://res.cloudinary.com/deod0oalc/image/upload/Herrer%C3%ADa_general_f2zhjn.png" alt="Herrería en general">
<h3>Herrería en general</h3>
</div>

<div class="servicio">
<img src="https://res.cloudinary.com/deod0oalc/image/upload/Suministro_lamina_dhvsvq.png" alt="Suministro de lámina">
<h3>Suministro de lámina</h3>
</div>

<div class="servicio">
<img src="https://res.cloudinary.com/deod0oalc/image/upload/Pintura_industrial_ve15yk.png" alt="Pintura industrial">
<h3>Pintura industrial</h3>
</div>

<div class="servicio">
<img src="https://res.cloudinary.com/deod0oalc/image/upload/Calculo_industrial_m5ijfw.png" alt="Cálculo estructural">
<h3>Cálculo estructural</h3>
</div>

</div>

</section>

</body>
</html>

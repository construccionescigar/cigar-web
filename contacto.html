<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CIGAR | Contacto</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

/* BODY */
body{
  min-height:100vh;
  background:url('https://images.unsplash.com/photo-1581091215367-59ab6f0c1d0c') center/cover no-repeat;
  position:relative;
}

/* OVERLAY */
body::before{
  content:'';
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.70);
  z-index:1;
}

/* NAV */
header{
  background:#000;
  padding:18px 40px;
  display:flex;
  justify-content:center;
  position:relative;
  z-index:3;
}

nav a{
  color:white;
  text-decoration:none;
  margin:0 20px;
  font-size:16px;
  font-weight:bold;
  transition:0.3s;
}

nav a:hover{
  color:#ffb400;
}

/* CONTENIDO */
.content{
  position:relative;
  z-index:2;
  text-align:center;
  color:white;
  padding:80px 20px;
}

h1{
  font-size:44px;
  margin-bottom:10px;
}

p{
  font-size:18px;
  opacity:0.9;
}

/* CAJA PRINCIPAL */
.box{
  margin-top:40px;
  display:inline-block;
  padding:35px 30px;
  background:rgba(0,0,0,0.55);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:14px;
  backdrop-filter: blur(6px);
  min-width:280px;
}

/* TEXTO INTERNO */
.box p{
  margin-bottom:15px;
  font-size:15px;
  opacity:0.9;
}

/* BOTONES GENERALES */
.btn{
  display:block;
  width:240px;
  margin:12px auto;
  padding:14px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
}

/* WHATSAPP */
.wa{
  background:#25D366;
  color:white;
}

.wa:hover{
  transform:scale(1.05);
  background:#1ebe5d;
}

/* LLAMADA */
.call{
  background:#111;
  color:white;
  border:1px solid rgba(255,255,255,0.2);
}

.call:hover{
  transform:scale(1.05);
  background:#000;
}

/* EMAIL */
.mail{
  background:#e0e0e0;
  color:#000;
}

.mail:hover{
  transform:scale(1.05);
  background:#cfcfcf;
}

</style>
</head>

<body>

<header>
  <nav>
    <a href="./index.html">Inicio</a>
    <a href="./informacion.html">Información</a>
    <a href="./contacto.html">Contacto</a>
  </nav>
</header>

<div class="content">

  <h1>Contacto</h1>
  <p>Atención inmediata para cotizaciones industriales</p>

  <div class="box">

    <p>📍 Servicio en todo México<br>
    📞 Respuesta rápida 24/7<br>
    📩 Cotizaciones sin compromiso</p>

    <a class="btn wa" href="https://wa.me/5215512345678" target="_blank">
      WhatsApp
    </a>

    <a class="btn call" href="tel:5215512345678">
      Llamar ahora
    </a>

    <a class="btn mail" href="mailto:contacto@cigar.com">
      Enviar correo
    </a>

  </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CIGAR | Contacto</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

/* BODY */
body{
  min-height:100vh;
  background:url('https://images.unsplash.com/photo-1581091215367-59ab6f0c1d0c') center/cover no-repeat;
  position:relative;
}

/* OVERLAY */
body::before{
  content:'';
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.65);
  z-index:1;
  pointer-events:none;
}

/* HEADER */
header{
  background:#000;
  padding:18px 40px;
  display:flex;
  justify-content:center;
  position:relative;
  z-index:3;
}

nav a{
  color:white;
  text-decoration:none;
  margin:0 20px;
  font-size:16px;
  transition:0.3s;
}

nav a:hover{
  color:#ffb400;
}

/* CONTENIDO */
.content{
  position:relative;
  z-index:2;
  text-align:center;
  color:white;
  padding:80px 20px;
}

/* TITULO */
h1{
  font-size:42px;
  margin-bottom:10px;
}

p{
  font-size:18px;
  opacity:0.9;
}

/* CAJA */
.box{
  margin-top:40px;
  display:inline-block;
  padding:30px;
  background:rgba(0,0,0,0.5);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:12px;
}

/* BOTÓN WHATSAPP */
.btn{
  background:#25D366;
  padding:15px 25px;
  color:white;
  text-decoration:none;
  border-radius:8px;
  display:inline-block;
  margin-top:25px;
  font-weight:bold;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
}

</style>
</head>

<body>

<header>
  <nav>
    <a href="./index.html">Inicio</a>
    <a href="./servicios.html">Servicios</a>
    <a href="./contacto.html">Contacto</a>
  </nav>
</header>

<div class="content">

  <h1>Contacto</h1>
  <p>Atención inmediata para cotizaciones industriales</p>

  <div class="box">
    <p>Estamos listos para atender tu proyecto</p>

    <a class="btn" href="https://wa.me/5215512345678" target="_blank">
      WhatsApp
    </a>
  </div>

</div>

</body>
</html>

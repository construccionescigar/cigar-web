<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  min-height:100vh;
  background:url('https://images.unsplash.com/photo-1581091215367-59ab6f0c1d0c') center/cover no-repeat;
  position:relative;
}

body::before{
  content:'';
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.72);
  z-index:1;
}

header{
  background:#000;
  height:70px;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  z-index:3;
}

nav a{
  color:white;
  text-decoration:none;
  margin:0 20px;
  font-size:16px;
  font-weight:bold;
  line-height:70px;
  transition:0.3s;
}

nav a:hover{
  color:#ffb400;
}

.content{
  position:relative;
  z-index:2;
  text-align:center;
  color:white;
  padding:60px 20px;
  animation:fadeUp 0.9s ease-out;
}

.logo-top img{
  height:160px;
  margin-bottom:15px;
}

h1{
  font-size:44px;
  margin-bottom:10px;
}

p{
  font-size:18px;
  opacity:0.9;
}

/* GRID */
.contact-grid{
  margin-top:40px;
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(280px,1fr));
  gap:25px;
  max-width:900px;
  margin-left:auto;
  margin-right:auto;
}

/* CARDS */
.box{
  padding:30px 25px;
  background:rgba(0,0,0,0.55);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:14px;
  backdrop-filter: blur(6px);
  animation:fadeUp 1.2s ease-out;
}

.box h3{
  color:#ffb400;
  margin-bottom:15px;
}

/* BOTONES */
.btn{
  display:block;
  width:100%;
  margin:10px 0;
  padding:14px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
}

.wa{
  background:#25D366;
  color:white;
}

.wa:hover{
  transform:scale(1.05);
  background:#1ebe5d;
}

.call{
  background:#111;
  color:white;
  border:1px solid rgba(255,255,255,0.2);
}

.call:hover{
  transform:scale(1.05);
}

.mail{
  background:#e0e0e0;
  color:#000;
}

.mail:hover{
  transform:scale(1.05);
  background:#cfcfcf;
}

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(30px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.whatsapp-float{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  background:#25D366;
  color:white;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  text-decoration:none;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  z-index:9999;
  transition:0.3s;
}

.whatsapp-float:hover{
  transform:scale(1.1);
}

</style>
